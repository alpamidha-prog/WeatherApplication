<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple, premium weather application displaying current weather for global cities.">
    <title>Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="weather-backgrounds"></div>
    <div class="app-container">
        <header class="header">
            <h1>Global Weather</h1>
            <div class="unit-toggle">
                <span class="unit-label active" id="unit-c">°C</span>
                <label class="switch">
                    <input type="checkbox" id="unit-checkbox">
                    <span class="slider round"></span>
                </label>
                <span class="unit-label" id="unit-f">°F</span>
            </div>
        </header>

        <main class="main-content">
            <div class="search-section">
                <form id="search-form">
                    <button type="button" id="geo-btn" title="Use My Location">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                    </button>
                    <input type="text" id="location-input" placeholder="Search country or city..." required autocomplete="off">
                    <button type="submit" id="search-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </form>
                <div id="loading" class="hidden">Fetching data...</div>
                <div id="error-message" class="hidden error"></div>
            </div>

            <div class="quick-links">
                <div class="link-group">
                    <h3>🌍 Select Country</h3>
                    <select id="country-dropdown" class="country-dropdown">
                        <option value="" disabled selected>Choose a country...</option>
                    </select>
                </div>
                <div class="link-group" id="cities-group" style="display: none;">
                    <h3>🏙️ Select City in <span id="selected-country-name"></span></h3>
                    <select id="city-dropdown" class="country-dropdown">
                        <option value="" disabled selected>Choose a city...</option>
                    </select>
                </div>
            </div>

            <div id="weather-card" class="weather-card hidden">
                <div class="card-header">
                    <h2 id="city-name" class="city-name">City Name</h2>
                    <p id="country-name" class="country-name">Country</p>
                </div>
                
                <div class="weather-info">
                    <div class="temperature">
                        <span id="temp-value">--</span><span class="unit">°C</span>
                    </div>
                    <div class="condition">
                        <div id="weather-icon" class="weather-icon">☀️</div>
                        <p id="weather-desc">Sunny</p>
                    </div>
                </div>
                
                <div class="weather-details">
                    <div class="detail-item">
                        <span class="detail-label">Feels Like</span>
                        <span id="feels-like" class="detail-value">-- °C</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">UV Index</span>
                        <span id="uv-index" class="detail-value">--</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Wind</span>
                        <span id="wind-speed" class="detail-value">-- km/h</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Humidity</span>
                        <span id="humidity" class="detail-value">-- %</span>
                    </div>
                </div>
            </div>

            <div id="forecast-container" class="forecast-container hidden">
                <h3>5-Day Forecast</h3>
                <div class="forecast-scroll" id="forecast-scroll">
                    <!-- Forecast items will go here -->
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
